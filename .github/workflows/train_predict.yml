name: Daily Train + Predict

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC
  workflow_dispatch:

jobs:
  train_option_a:
    runs-on: ubuntu-latest
    env:
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      OPTION: A
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python train_predict.py

  train_option_b:
    runs-on: ubuntu-latest
    env:
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      OPTION: B
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python train_predict.py
