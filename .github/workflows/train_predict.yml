name: Daily Train + Predict

on:
  schedule:
    # Run at 22:00 UTC daily (after data update at 21:30)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  train-predict:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run training and prediction
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        echo "Starting daily training and prediction pipeline..."
        python train_predict.py
        echo "Pipeline completed."
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: train-predict-logs
        path: |
          *.log
          /tmp/*.json
        retention-days: 7
